<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCash - Dashboard Financeiro</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
        <h1>Smart<span>Cash</span></h1>
        <p>Seu Dashboard Financeiro Inteligente</p>
    </header>

    <main class="container">
        <section id="balance">
            <div class="card">
                <h3>Entradas</h3>
                <p id="incomeDisplay" class="income">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <p id="expenseDisplay" class="expense">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Total</h3>
                <p id="totalDisplay">R$ 0,00</p>
            </div>
        </section>

        <section id="transaction-form" class="box">
            <h2>Nova Transação</h2>
            <form id="form">
                <div class="input-row">
                    <input type="text" id="description" placeholder="Descrição (ex: Aluguel)" required>
                    <input type="number" step="0.01" id="amount" placeholder="Valor (ex: -50.00)" required>
                    <select id="category" required>
                        <option value="" disabled selected>Categoria</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Moradia">Moradia</option>
                        <option value="Trabalho">Trabalho</option>
                    </select>
                </div>
                <button type="submit">Adicionar Transação</button>
            </form>
        </section>

        <section id="data-display" class="box">
            <h2>Movimentações</h2>
            <div class="table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Valor</th>
                            <th>Categoria</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - SmartCash | Gestão Financeira Inteligente</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
